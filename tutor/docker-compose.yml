version: "3.8"

networks:
  tutor_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  tutor_data:
  config_data:

# 配置服务
services:
  # 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: tutor-postgres
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor123
      POSTGRES_DB: tutor
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      tutor_network:
        aliases:
          - postgres.tutor.internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

  # 缓存服务
  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      tutor_network:
        aliases:
          - redis.tutor.internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # 应用服务
  app:
    build: .
    container_name: tutor-app
    ports:
      - "8000:8000"
    volumes:
      - tutor_data:/app/data
      - config_data:/app/config:ro
    environment:
      - TUTOR_CONFIG=/app/config/config.yaml
      - DATABASE_URL=postgresql+asyncpg://tutor:tutor123@postgres:5432/tutor
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - API_KEY=tutor-mvp-secret-key-change-in-production
      - PYTHONUNBUFFERED=1
      - TUTOR_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      tutor_network:
        aliases:
          - app.tutor.internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

