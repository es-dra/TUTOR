name: Bug Report
description: Report a reproducible bug
title: "[BUG] "
labels: ["bug"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the template below to help us investigate and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug
      placeholder: Please describe the bug you encountered
      render: markdown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please provide detailed steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: A clear and concise description of what you expected to happen
      render: markdown
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: A clear and concise description of what actually happened
      render: markdown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of TUTOR are you using?
      placeholder: e.g., v1.0.0, commit hash, or date
    validations:
      required: false
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: What environment are you running TUTOR in?
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please copy and paste any relevant log output
      placeholder: |
        [2026-04-06 10:30:00] ERROR: ...
      render: markdown
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      description: Please confirm the following
      options:
        - label: I have checked existing issues for similar problems
          required: true
        - label: I have read the [Contributing Guidelines](.github/CONTRIBUTING.md)
          required: true