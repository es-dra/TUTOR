# TUTOR Development Docker Compose
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tutor-postgres
    environment:
      POSTGRES_DB: tutor
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tutor-gateway
    command: uvicorn tutor.core.gateway:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+psycopg2://tutor:tutor_dev@postgres/tutor
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv  #  Prevent venv mount issues
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Celery worker (异步任务)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tutor-worker
    command: celery -A tutor.core.celery_app worker --loglevel=info --hostname=worker1
    environment:
      - DATABASE_URL=postgresql+psycopg2://tutor:tutor_dev@postgres/tutor
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flower (Celery监控) - 可选
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tutor-flower
    command: celery -A tutor.core.celery_app flower --port=5555
    environment:
      - DATABASE_URL=postgresql+psycopg2://tutor:tutor_dev@postgres/tutor
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles: ["monitoring"]  # 需要显式启用: docker-compose --profile monitoring up

  # Prometheus (指标收集)
  prometheus:
    image: prom/prometheus:latest
    container_name: tutor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    profiles: ["monitoring"]

  # Grafana (可视化仪表板)
  grafana:
    image: grafana/grafana:latest
    container_name: tutor-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning/:/etc/grafana/provisioning/
    profiles: ["monitoring"]

  # Loki (日志聚合)
  loki:
    image: grafana/loki:latest
    container_name: tutor-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/:/etc/loki/
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    profiles: ["monitoring"]

  # Web前端开发服务器 (需要Node.js)
  web:
    image: node:18-alpine
    container_name: tutor-web
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - gateway
    profiles: ["frontend"]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: tutor-dev
